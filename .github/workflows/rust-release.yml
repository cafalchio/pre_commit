name: Rust Release for Linux and Mac

on:
  push:
    tags:
      - "*"     # Runs on every tag push, e.g. v0.1
  workflow_dispatch:   # Allows manual execution

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build release
        run: cargo build --release

      - name: Package binary
        run: |
          BIN_NAME=pre_commit-$RUNNER_OS
          cp target/release/pre_commit $BIN_NAME
        shell: bash

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: pre_commit-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}